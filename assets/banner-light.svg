<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title">
  <title id="title">Minseok Kong — AI Application Engineer</title>
  <style>
    /* responsive: media queries evaluate against the rendered image width */
    @media (max-width: 600px){
      .ov{font-size:19px; letter-spacing:4.4px}
      .mt{font-size:28px}
      .meta{display:none}
    }
    @media (max-width: 440px){
      .ov{font-size:24px; letter-spacing:3.8px}
      .mt{font-size:34px}
    }
  </style>
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7360ea"/>
      <stop offset="1" stop-color="#1fa396"/>
    </linearGradient>
    <radialGradient id="washViolet" cx="0.74" cy="-0.05" r="0.75">
      <stop offset="0" stop-color="#7360ea" stop-opacity="0.09"/>
      <stop offset="1" stop-color="#7360ea" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="washTeal" cx="0.10" cy="1.05" r="0.70">
      <stop offset="0" stop-color="#1fa396" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#1fa396" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="panel">
      <rect x="1" y="1" width="1198" height="298" rx="18"/>
    </clipPath>
  </defs>

  <!-- panel -->
  <rect x="1" y="1" width="1198" height="298" rx="18" fill="#fbfbfa"/>
  <g clip-path="url(#panel)">
    <rect x="1" y="1" width="1198" height="298" fill="url(#washViolet)"/>
    <rect x="1" y="1" width="1198" height="298" fill="url(#washTeal)"/>

    <!-- orbits -->
    <g transform="translate(990 150)">
      <circle r="148" stroke="#14171d" stroke-opacity="0.10" stroke-width="1"/>
      <circle cx="10" cy="-8" r="94" stroke="#14171d" stroke-opacity="0.15" stroke-width="1"/>
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="60s" repeatCount="indefinite"/>
        <g transform="rotate(-38)">
          <circle r="148" stroke="url(#accent)" stroke-width="2" stroke-dasharray="130 800" stroke-linecap="round" opacity="0.8"/>
          <circle cx="94.5" cy="113.9" r="4.5" fill="#7360ea"/>
        </g>
      </g>
      <g transform="translate(10 -8)">
        <g>
          <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="90s" repeatCount="indefinite"/>
          <circle cx="-94" cy="0" r="3" fill="#1fa396" opacity="0.85"/>
        </g>
      </g>
    </g>
    <circle cx="846" cy="64" r="1.3" fill="#7360ea" opacity="0.35"/>
    <circle cx="1122" cy="246" r="1.2" fill="#1fa396" opacity="0.35"/>
  </g>
  <rect x="1" y="1" width="1198" height="298" rx="18" stroke="#e7e5e2" stroke-width="1"/>

  <!-- type -->
  <text class="ov" x="73" y="82" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="600" letter-spacing="5" fill="#6b7184">AI APPLICATION ENGINEER</text>
  <text x="70" y="152" font-family="Georgia, 'Times New Roman', serif" font-size="64" letter-spacing="-1" fill="#14171d">Minseok Kong<tspan fill="#7360ea">.</tspan></text>
  <rect x="73" y="180" width="46" height="3" rx="1.5" fill="url(#accent)"/>
  <text class="mt" x="72" y="222" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-style="italic" fill="#5f6570">Models are power; decisions are direction.</text>
  <text class="meta" x="73" y="264" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10.5" font-weight="600" letter-spacing="3.2" fill="#7d8391">SEOUL · SOUTH KOREA</text>
</svg>
